<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juvox Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container" class="home-mode">
        <h1 class="logo">Juvox</h1>
        
        <div class="search-wrapper">
            <div class="search-box">
                <select id="engine-select" title="Выбор поисковика">
                    <option value="https://www.google.com/search?igu=1&q=">Google</option>
                    <option value="https://yandex.ru/search/?text=">Яндекс</option>
                </select>
                
                <input type="text" id="search-input" placeholder="Введите запрос или URL..." autocomplete="off">
                <button id="search-btn">Найти</button>
            </div>
            
            <div id="dropdown-box" class="dropdown-content hidden">
                <ul id="suggestions" class="list-section"></ul>
                <div class="history-separator">История поисков:</div>
                <ul id="history-list" class="list-section"></ul>
            </div>
        </div>

        <div class="web-view-container">
            <iframe id="web-frame" src="about:blank" title="Juvox View"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
