<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juvox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">Juvox</h1>
        
        <div class="search-wrapper">
            <div class="search-box">
                <select id="engine-select" title="Выберите поисковик">
                    <option value="https://yandex.ru/search/?text=">Яндекс</option>
                    <option value="https://www.google.com/search?q=">Google</option>
                    <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
                </select>
                
                <input type="text" id="search-input" placeholder="Введите поисковый запрос..." autocomplete="off">
                
                <button id="search-btn">Найти</button>
            </div>
            
            <ul id="suggestions" class="suggestions-list hidden"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
