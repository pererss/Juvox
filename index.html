<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Juvox — умный браузер</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="browser">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="logo">
                <i class="fas fa-globe"></i> Juvox
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun"></i>
            </div>
        </div>

        <!-- Вкладки -->
        <div class="tab-bar" id="tabBar"></div>

        <!-- Панель поиска -->
        <div class="search-container">
            <div class="search-engine-select">
                <button class="engine-btn" id="engineBtn">
                    <img src="https://www.google.com/favicon.ico" alt="Google" id="engineIcon">
                    <span id="engineName">Google</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="engine-dropdown" id="engineDropdown">
                    <div class="engine-option" data-engine="google" data-icon="https://www.google.com/favicon.ico">
                        <img src="https://www.google.com/favicon.ico"> Google
                    </div>
                    <div class="engine-option" data-engine="yandex" data-icon="https://yandex.ru/favicon.ico">
                        <img src="https://yandex.ru/favicon.ico"> Яндекс
                    </div>
                    <div class="engine-option" data-engine="duckduckgo" data-icon="https://duckduckgo.com/favicon.ico">
                        <img src="https://duckduckgo.com/favicon.ico"> DuckDuckGo
                    </div>
                    <div class="engine-option" data-engine="bing" data-icon="https://www.bing.com/favicon.ico">
                        <img src="https://www.bing.com/favicon.ico"> Bing
                    </div>
                </div>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Поиск в интернете или введите адрес..." autocomplete="off">
                <button class="voice-btn" id="voiceBtn"><i class="fas fa-microphone"></i></button>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Контент -->
        <div class="content-area">
            <div class="start-page" id="startPage">
                <div class="start-content">
                    <div class="start-logo">
                        <i class="fas fa-globe"></i> Juvox
                    </div>
                    <div class="start-search">
                        <input type="text" id="startSearch" placeholder="Поиск или введите адрес...">
                        <button id="startSearchBtn">Найти</button>
                    </div>
                    <div class="quick-links">
                        <div class="quick-link" data-url="https://www.youtube.com">
                            <i class="fab fa-youtube"></i>
                            <span>YouTube</span>
                        </div>
                        <div class="quick-link" data-url="https://github.com">
                            <i class="fab fa-github"></i>
                            <span>GitHub</span>
                        </div>
                        <div class="quick-link" data-url="https://web.telegram.org">
                            <i class="fab fa-telegram"></i>
                            <span>Telegram</span>
                        </div>
                        <div class="quick-link" data-url="https://chat.openai.com">
                            <i class="fas fa-brain"></i>
                            <span>ChatGPT</span>
                        </div>
                    </div>
                </div>
            </div>
            <iframe id="webpage" src="about:blank" style="display: none;"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
