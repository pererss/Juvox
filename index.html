<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juvox Premium Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-bg="default">

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Juvox</div>
            
            <nav class="nav-menu">
                <button id="history-btn" class="nav-link">📜 История</button>
                <button id="settings-btn" class="nav-link">⚙️ Настройки</button>
            </nav>

            <div class="tabs-section">
                <h3>Активные вкладки</h3>
                <ul id="tabs-container">
                    <li id="add-tab" class="hidden"></li>
                </ul>
            </div>

            <div class="sidebar-footer">
                <button id="theme-toggle">🌙</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="bg-glow glow-1"></div>
            <div class="bg-glow glow-2"></div>

            <div id="top-search-area"></div>

            <div id="home-screen" class="welcome-container">
                <h1 class="brand-title">Juvox</h1>
                <p class="brand-subtitle">Твой интернет. Твои правила. Полная приватность.</p>
                
                <div class="search-wrapper">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Поиск в глобальной сети..." autocomplete="off">
                        <div id="suggestions-box" class="suggestions-hidden"></div>
                        <button id="search-btn">Найти</button>
                    </div>
                </div>
            </div>

            <div id="web-view-container" class="hidden"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
