<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Juvox — быстрый браузер</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="browser">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <div class="tabs-container" id="tabsContainer">
                <div class="tabs" id="tabs"></div>
                <button class="new-tab" id="newTabBtn">+</button>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-palette"></i>
            </div>
        </div>

        <!-- Поисковая строка -->
        <div class="search-section">
            <div class="search-wrapper">
                <div class="search-engine" id="searchEngine">
                    <button class="engine-btn" id="engineBtn">
                        <img src="https://www.google.com/favicon.ico" id="engineIcon">
                        <span id="engineName">Google</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="engine-dropdown" id="engineDropdown">
                        <div class="engine-option" data-engine="google">
                            <img src="https://www.google.com/favicon.ico"> Google
                        </div>
                        <div class="engine-option" data-engine="yandex">
                            <img src="https://yandex.ru/favicon.ico"> Яндекс
                        </div>
                        <div class="engine-option" data-engine="duckduckgo">
                            <img src="https://duckduckgo.com/favicon.ico"> DuckDuckGo
                        </div>
                        <div class="engine-option" data-engine="bing">
                            <img src="https://www.bing.com/favicon.ico"> Bing
                        </div>
                    </div>
                </div>
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск или введите адрес" autocomplete="off">
                </div>
            </div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Контент (вкладки iframe) -->
        <div class="content" id="content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
